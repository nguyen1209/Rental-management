{% extends "base.html" %}

{% block title %}Tạo đơn thuê mới{% endblock %}

{% block content %}
<h2 class="mb-4">Tạo đơn thuê mới</h2>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>Chọn khách hàng *</label>
                    <select name="customer_id" class="form-select" required>
                        <option value="">Chọn khách hàng</option>
                        {% for customer in customers %}
                        <option value="{{ customer.id }}">{{ customer.fullname }} - {{ customer.phone }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label>Chọn sản phẩm *</label>
                    <select name="product_id" class="form-select" required>
                        <option value="">Chọn sản phẩm</option>
                        {% for product in products %}
                        <option value="{{ product.id }}">{{ product.name }} - {{ "{:,.0f}".format(product.price_per_day) }} VNĐ/ngày (Còn: {{ product.available_quantity }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3 mb-3">
                    <label>Số lượng *</label>
                    <input type="number" name="quantity" class="form-control" value="1" min="1" required>
                </div>
                <div class="col-md-3 mb-3">
                    <label>Ngày bắt đầu *</label>
                    <input type="date" name="start_date" class="form-control" required>
                </div>
                <div class="col-md-3 mb-3">
                    <label>Ngày kết thúc *</label>
                    <input type="date" name="end_date" class="form-control" required>
                </div>
                <div class="col-md-12 mb-3">
                    <label>Ghi chú</label>
                    <textarea name="notes" rows="2" class="form-control"></textarea>
                </div>
            </div>
            <div class="mt-3">
                <button type="submit" class="btn btn-primary">Tạo đơn thuê</button>
                <a href="{{ url_for('rentals') }}" class="btn btn-secondary">Hủy</a>
            </div>
        </form>
    </div>
</div>

<script>
    // Tính toán tự động số ngày và tổng tiền
    document.querySelector('select[name="product_id"]').addEventListener('change', function() {
        // Có thể thêm tính năng tự động tính giá
    });
</script>
{% endblock %}
