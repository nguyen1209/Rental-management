{% extends "base.html" %}
{% block content %}
<h2>Thêm khách hàng</h2>
<form method="POST">
    <input type="text" name="fullname" class="form-control mb-2" placeholder="Họ tên" required>
    <input type="text" name="phone" class="form-control mb-2" placeholder="Số điện thoại" required>
    <input type="email" name="email" class="form-control mb-2" placeholder="Email">
    <textarea name="address" class="form-control mb-2" placeholder="Địa chỉ"></textarea>
    <button type="submit" class="btn btn-primary">Lưu</button>
    <a href="/customers" class="btn btn-secondary">Hủy</a>
</form>
{% endblock %}
